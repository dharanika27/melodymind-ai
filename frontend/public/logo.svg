<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow3" cx="50%" cy="78%" r="65%">
      <stop offset="0%" stop-color="#173463" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#141B2E" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0A0E1A" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="noteGrad3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#2E5FD9"/>
      <stop offset="100%" stop-color="#7FB2FF"/>
    </linearGradient>

    <radialGradient id="nodeGlow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9FE8FF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#9FE8FF" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur3" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
  </defs>

  <!-- App icon background: rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGlow3)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="107.5" fill="none" stroke="#28324A" stroke-width="1"/>

  <!-- Note stem -->
  <rect x="270" y="128" width="20" height="220" rx="10" fill="url(#noteGrad3)"/>

  <!-- Note head, tilted -->
  <ellipse cx="228" cy="360" rx="52" ry="40" fill="url(#noteGrad3)" transform="rotate(-18 228 360)"/>

  <!-- Flag rendered as a small AI node-network curling off the stem -->
  <path d="M290,128 C 340,140 372,168 380,206 C 372,192 348,182 322,186"
        fill="none" stroke="#9FE8FF" stroke-width="3" stroke-opacity="0.65" stroke-linecap="round"/>
  <path d="M290,168 C 328,176 352,196 358,226"
        fill="none" stroke="#9FE8FF" stroke-width="3" stroke-opacity="0.5" stroke-linecap="round"/>

  <g>
    <circle cx="290" cy="128" r="20" fill="url(#nodeGlow3)" filter="url(#softBlur3)"/>
    <circle cx="380" cy="206" r="20" fill="url(#nodeGlow3)" filter="url(#softBlur3)"/>
    <circle cx="322" cy="186" r="16" fill="url(#nodeGlow3)" filter="url(#softBlur3)"/>
    <circle cx="358" cy="226" r="16" fill="url(#nodeGlow3)" filter="url(#softBlur3)"/>
  </g>
  <g fill="#EAFBFF" stroke="#0A0E1A" stroke-width="2">
    <circle cx="290" cy="128" r="8"/>
    <circle cx="380" cy="206" r="8"/>
    <circle cx="322" cy="186" r="6"/>
    <circle cx="358" cy="226" r="6"/>
  </g>
</svg>
